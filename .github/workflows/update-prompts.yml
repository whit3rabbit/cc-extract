name: Update Prompt Catalogs

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-prompt-catalogs
  cancel-in-progress: false

jobs:
  update-prompts:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install project
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e '.[dev]'

      - name: Extract missing prompt catalogs
        run: |
          .venv/bin/python tools/extract_prompt_versions.py --since-existing-latest

      - name: Validate prompt tooling
        run: |
          .venv/bin/python -m pytest -q tests/test_prompt_version_extraction.py

      - name: Commit prompt catalog updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          while IFS= read -r -d '' path; do
            git add -- "$path"
          done < <(find prompts -maxdepth 1 -type f -name '*.json' -print0)

          if git diff --cached --quiet; then
            echo "No prompt catalog changes to commit."
            exit 0
          fi

          git commit -m "Update prompt catalogs"
          git push
